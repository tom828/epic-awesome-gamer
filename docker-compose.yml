# ============================================================
# Epic Kiosk - 自动驾驶领取系统（本地编译版本）
# ============================================================
# GitHub: https://github.com/10000ge10000/epic-kiosk
# 公益站点: https://epic.910501.xyz/
# ============================================================
#
# 🚀 部署方式：
#   1. Linux 一键部署: curl -fsSL https://raw.githubusercontent.com/10000ge10000/epic-kiosk/main/install.sh | bash
#   2. 手动部署: 克隆项目 → 修改 API Key → docker compose up -d --build
#
# ⚠️ 必须修改: SILICONFLOW_API_KEY
#    获取地址: https://cloud.siliconflow.cn/i/OVI2n57p
#
# 📦 镜像说明：
#   - redis:alpine - 官方镜像，直接拉取
#   - epic-kiosk-web - 本地编译
#   - epic-kiosk-worker - 本地编译
# ============================================================

services:
  # ============================================================
  # Redis: 消息队列（官方镜像）
  # ============================================================
  redis:
    image: redis:alpine
    container_name: epic-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Web: 前端服务（FastAPI）
  # 本地编译，首次部署约需 2-3 分钟
  # ============================================================
  web:
    build:
      context: .
    image: epic-kiosk-web:local
    container_name: epic-web
    ports:
      - "18000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - REDIS_HOST=redis
      - TZ=Asia/Shanghai
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Worker: 后台任务执行器（浏览器自动化）
  # 本地编译，首次部署约需 5-10 分钟
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: epic-kiosk-worker:local
    container_name: epic-worker
    user: root
    volumes:
      - ./data:/app/data
      - ./data:/app/app/volumes
    environment:
      - REDIS_HOST=redis
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - ENABLE_APSCHEDULER=false
      - API_PROVIDER=siliconflow
      - SILICONFLOW_BASE_URL=https://api.siliconflow.cn/v1
      # ============================================================
      # ⚠️⚠️⚠️ 必须配置 API Key ⚠️⚠️⚠️
      # ============================================================
      # 方式一：直接修改下方环境变量（不推荐，会暴露在配置文件中）
      # 方式二：创建 .env 文件，添加 SILICONFLOW_API_KEY=sk-xxx（推荐）
      # ============================================================
      # 获取步骤：
      # 1. 访问邀请链接: https://cloud.siliconflow.cn/i/OVI2n57p
      # 2. 注册账号并完成实名认证
      # 3. 双方各得 ¥16 代金券（可领 1500+ 次任务）
      # 4. 在控制台创建 API Key
      # ============================================================
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
      # 环境变量（绕过父类验证器，无需修改）
      - GEMINI_API_KEY=not_used
      # ============================================================
      # 模型配置（已优化验证码识别能力）
      # 主模型: Qwen2.5-VL-32B-Instruct (性价比高，速度快)
      # 备用模型: Qwen2.5-VL-72B-Instruct (能力更强)
      - CAPTCHA_MODEL=Qwen/Qwen2.5-VL-32B-Instruct
      - CAPTCHA_MODEL_FALLBACK=Qwen/Qwen2.5-VL-72B-Instruct
      - PRIMARY_MODEL=Qwen/Qwen2.5-7B-Instruct
      - PRIMARY_MODEL_FALLBACK=Qwen/Qwen2.5-72B-Instruct
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
